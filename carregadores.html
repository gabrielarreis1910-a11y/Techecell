<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregadores - Techecell</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #111;
      color: white;
    }

    header {
      background-color: #e60023;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .produto {
      background-color: #222;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
    }

    .produto img {
      width: 120px;
      margin-bottom: 10px;
    }

    .preco {
      margin-top: 10px;
      color: #00ff88;
      font-size: 18px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background-color: #e60023;
      border: none;
      color: white;
      border-radius: 5px;
    }

    a.voltar {
      display: block;
      padding: 10px;
      text-align: center;
      color: white;
      text-decoration: none;
      background-color: #333;
    }
  </style>
</head>

<body>

<header>
  Carregadores
</header>

<a href="index.html" class="voltar">⬅ Voltar</a>

<div class="container">

  <!-- PRODUTO 1 -->
  <div class="produto">
    <img src="https://via.placeholder.com/120" alt="Carregador">
    <h3>Carregador Turbo</h3>
    <div class="preco">R$ 49,90</div>
    <button>Comprar</button>
  </div>

  <!-- PRODUTO 2 -->
  <div class="produto">
    <img src="https://via.placeholder.com/120" alt="Carregador">
    <h3>Carregador Tipo-C</h3>
    <div class="preco">R$ 39,90</div>
    <button>Comprar</button>
  </div>

</div>

</body>
</html>
